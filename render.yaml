services:
  - type: web
    name: gig-loan-backend
    env: python
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://gig-loan-frontend.onrender.com

  - type: web
    name: gig-loan-frontend
    env: static
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    staticPublish: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://gig-loan-backend.onrender.com/api
