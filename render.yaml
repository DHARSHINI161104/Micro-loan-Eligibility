services:
  - type: web
    name: gig-loan-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://your-frontend.onrender.com
    repo: https://github.com/your-repo/gig-loan-eligibility

  - type: web
    name: gig-loan-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublish: dist
    envVars:
      - key: VITE_API_URL
        value: https://gig-loan-backend.onrender.com/api
    repo: https://github.com/your-repo/gig-loan-eligibility
